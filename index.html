<!DOCTYPE html>
<html lang="en">
<head>
  <!-- <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet"> -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script>emailjs.init("4BjgTTumGjkrr7HyO");</script>

  <!-- Microsoft Teams JavaScript library -->
  <script src="https://res.cdn.office.net/teams-js/2.53.1/js/MicrosoftTeams.min.js"
          integrity="sha384-u/ADAeV1WhPQrTvoCmXcIhzguvD7vpAOyMxZFTIk4lTwgZAKtRKT1SFqOWTyQJ/s"
          crossorigin="anonymous"></script>
  <script>
    // Initialise the Teams SDK when running inside Teams. In a normal browser
    // there is no Teams host to respond, so this quietly does nothing and the
    // app still works standalone (e.g. on Netlify or locally).
    if (window.microsoftTeams) {
      microsoftTeams.app.initialize()
        .then(function () {
          microsoftTeams.app.notifySuccess(); // tell Teams the tab loaded OK
        })
        .catch(function () {
          // Not inside Teams (or init timed out) — fine, the app runs normally.
        });
    }
  </script>
  <meta charset="UTF-8" />
  <link rel="icon" href="orange_icon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FPR take 5 checklist</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
    background-color: #091c31;
      background-image: url('background.png');
      background-size: contain;       /* or 'contain', or specific values like 100% 100% */
      background-repeat: no-repeat; /* prevents tiling */
      background-position: top left;  /* centers the image */
    }
  </style>
</head>
<body>
  <div id="app">

    <h1 class="page-title">FPR Energy - Take 5</h1>

    <!-- Stored Info Prompt -->
    <div id="stored-info" style="display: none;">
        <p id="info-text"></p>
        <button id="change-yes"><span>Yes</span></button>
        <button id="change-no"><span>No</span></button>
    </div>



    <div id="card">
      <p id="question-text">Loading...</p>
      <textarea id="text-input" placeholder="Type your answer..."></textarea>
      <button id="confirm-btn"><span>Confirm</span></button>
    </div>

    <div class="buttons">
      <button id="no-btn"><span>No</span></button>
      <button id="yes-btn"><span>Yes</span></button>
    </div>

    <div class="back-row">
      <button id="back-btn"><span>Go back</span></button>
      <span id="progress-text"></span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
